name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create as draft"
        required: false
        default: false
        type: boolean
      release_notes:
        description: "Release notes"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf dist/tlseye-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release tlseye${{ matrix.ext }}

      - name: Package artifacts (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path target/${{ matrix.target }}/release/tlseye${{ matrix.ext }} -DestinationPath dist/tlseye-${{ matrix.target }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tlseye-${{ matrix.target }}
          path: dist/*
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Release: Tag"
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: "Release: Create"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.draft }}
          body: |
            ${{ inputs.release_notes }}
            
            ## Usage
            
            1. Configure `config.toml`
            2. Run `./tlseye`
            3. Push PCAP payloads to Kafka via `scripts/pcap_to_kafka.py`
